<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h2>Create Account</h2>

    <form method="POST">
        <!-- CSRF token (required) -->
        {{ form.hidden_tag() }}

        <p>
            {{ form.username.label }}<br>
            {{ form.username() }}
        </p>

        <p>
            {{ form.password.label }}<br>
            {{ form.password() }}
        </p>

        <p>
            {{ form.submit() }}
        </p>
    </form>

    <br>

    <!-- Link to login -->
    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</body>
</html>
